<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3012</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #fff;
      color: #000;
      text-align: center;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 40px;
    }

    .welcome {
      font-family: 'Cinzel Decorative', serif;
      font-size: 72px;
      font-weight: 900;
      letter-spacing: 6px;
      text-transform: uppercase;
    }

    .shop-btn {
      font-family: 'Cinzel Decorative', serif;
      font-size: 22px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #000;
      text-decoration: none;
      border: 2px solid #000;
      padding: 14px 40px;
      transition: all 0.3s;
    }

    .shop-btn:hover {
      background: #000;
      color: #fff;
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="welcome">Welcome to 3012</div>
    <a href="#" class="shop-btn">Shop Here</a>
  </section>
</body>
</html>
