<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3012</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    @font-face {
      font-family: 'Texas';
      src: url('texas.ttf') format('truetype');
    }

    body {
      background-color: #fff;
      color: #000;
      text-align: center;
    }

    /* DATETIME */
    .datetime {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Texas', sans-serif;
      font-size: 14px;
      letter-spacing: 2px;
      color: #000;
      z-index: 998;
    }

    /* BURGER MENU */
    .burger {
      position: fixed;
      top: 20px;
      left: 20px;
      cursor: pointer;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .burger span {
      display: block;
      width: 30px;
      height: 3px;
      background: #000;
      transition: all 0.3s ease;
    }

    .burger.open span:nth-child(1) {
      transform: translateY(9px) rotate(45deg);
    }

    .burger.open span:nth-child(2) {
      opacity: 0;
    }

    .burger.open span:nth-child(3) {
      transform: translateY(-9px) rotate(-45deg);
    }

    /* NAV MENU */
    .nav-menu {
      position: fixed;
      top: 0;
      left: -100%;
      width: 300px;
      height: 100vh;
      background: #fff;
      border-right: 2px solid #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 40px;
      padding: 40px;
      transition: left 0.3s ease;
      z-index: 999;
    }

    .nav-menu.open {
      left: 0;
    }

    .nav-menu a {
      font-family: 'Texas', sans-serif;
      font-size: 36px;
      color: #000;
      text-decoration: none;
      letter-spacing: 3px;
      transition: opacity 0.2s;
    }

    .nav-menu a:hover {
      opacity: 0.5;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 40px;
    }

    .welcome {
      font-family: 'Texas', sans-serif;
      font-size: 72px;
      letter-spacing: 6px;
    }

    .logo-img {
      width: 400px;
      max-width: 90%;
      animation: fadeIn 2s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    .shop-btn {
      font-family: 'Texas', sans-serif;
      font-size: 22px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #000;
      text-decoration: none;
      border: 2px solid #000;
      padding: 14px 40px;
      transition: all 0.3s;
    }

    .shop-btn:hover {
      background: #000;
      color: #fff;
    }

    /* POPUP */
    .popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 2000;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .popup-overlay.hidden {
      display: none;
    }

    .popup {
      background: #fff;
      width: 340px;
      padding: 40px 30px;
      text-align: center;
      position: relative;
    }

    .popup-close {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 22px;
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'Texas', sans-serif;
      color: #000;
    }

    .popup-logo {
      width: 160px;
      margin-bottom: 20px;
    }

    .popup-title {
      font-family: 'Texas', sans-serif;
      font-size: 48px;
      letter-spacing: 2px;
      line-height: 1.1;
      margin-bottom: 15px;
    }

    .popup-subtitle {
      font-size: 14px;
      letter-spacing: 1px;
      color: #555;
      margin-bottom: 25px;
    }

    .popup input {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #000;
      font-size: 14px;
      margin-bottom: 15px;
      outline: none;
      font-family: Arial, sans-serif;
    }

    .popup-btn {
      width: 100%;
      padding: 14px;
      background: #000;
      color: #fff;
      border: none;
      font-family: 'Texas', sans-serif;
      font-size: 18px;
      letter-spacing: 3px;
      cursor: pointer;
      transition: opacity 0.3s;
    }

    .popup-btn:hover {
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <!-- POPUP -->
  <div class="popup-overlay" id="popupOverlay">
    <div class="popup">
      <button class="popup-close" id="popupClose">✕</button>
      <img src="logo.png" alt="3012" class="popup-logo">
      <div class="popup-title">10% OFF</div>
      <div class="popup-subtitle">Be part of the process. Join Now.</div>
      <input type="email" placeholder="Enter your email">
      <button class="popup-btn">GET MY 10%</button>
    </div>
  </div>

  <!-- DATETIME -->
  <div class="datetime" id="datetime"></div>

  <!-- BURGER -->
  <div class="burger" id="burger">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <!-- NAV MENU -->
  <nav class="nav-menu" id="navMenu">
    <a href="index.html">HOME</a>
    <a href="about.html">ABOUT</a>
    <a href="communicate.html">COMMUNICATE</a>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="welcome">Welcome to</div>
    <img src="logo.png" alt="3012" class="logo-img">
    <a href="#" class="shop-btn">Shop Here</a>
  </section>

  <script>
    // BURGER
    const burger = document.getElementById('burger');
    const navMenu = document.getElementById('navMenu');

    burger.addEventListener('click', () => {
      burger.classList.toggle('open');
      navMenu.classList.toggle('open');
    });

    // DATETIME
    function updateDateTime() {
      const now = new Date();
      const day = String(now.getDate()).padStart(2, '0');
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const year = now.getFullYear();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('datetime').textContent =
        `${day}/${month}/${year} ${hours}:${minutes}:${seconds}`;
    }

    updateDateTime();
    setInterval(updateDateTime, 1000);

    // POPUP — εμφανίζεται μετά από 3 δευτερόλεπτα
    setTimeout(() => {
      document.getElementById('popupOverlay').classList.remove('hidden');
    }, 3000);

    document.getElementById('popupClose').addEventListener('click', () => {
      document.getElementById('popupOverlay').classList.add('hidden');
    });
  </script>

</body>
</html>
